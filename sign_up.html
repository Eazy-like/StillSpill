<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        /* Basic Styling -  Move this to your styles.css file */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #121212; /* Dark background */
            color: #ffffff; /* White text */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-container {
            background-color: #202020; /* Slightly lighter background for container */
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px; /* Adjust width as needed */
        }

        h1 {
            color: #673ab7; /* Example color -  use your branding color */
            margin-bottom: 10px;
        }

        .motivation {
            font-style: italic;
            color: #9e9e9e; /* Slightly lighter text color */
            margin-bottom: 20px;
        }

        input {
            width: calc(100% - 22px); /* Account for padding and border */
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #424242; /* Darker border */
            background-color: #303030; /* Darker input background */
            color: #ffffff; /* White text in inputs */
            border-radius: 4px;
        }
        input:focus {
            outline: none;
            border-color: #673ab7;  /* Highlight on focus */
            box-shadow: 0 0 5px rgba(103, 58, 183, 0.3); /* Subtle glow on focus */

        }

        button {
            background-color: #673ab7; /* Example color */
            color: #ffffff;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #512da8; /* Darker shade on hover */
        }

        .login-link {
            margin-top: 20px;
        }

        .login-link a {
            color: #673ab7; /* Example color */
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

        <p class="motivation">"There is light at the end of the tunnel."</p>

            <input type="password" placeholder="Password" required>
